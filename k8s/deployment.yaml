apiVersion: apps/v1
kind: Deployment
metadata:
  name: carduka-deployment
  labels:
    app: carduka
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carduka
  template:
    metadata:
      labels:
        app: carduka
    spec:
      containers:
        - name: carduka
          image: carduka:1.0.2
          imagePullPolicy: Never
          ports:
            - containerPort: 8080

          livenessProbe:
            httpGet:
              port: 8080
              path: /actuator/health/liveness
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              port: 8080
              path: /actuator/health/readiness
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3